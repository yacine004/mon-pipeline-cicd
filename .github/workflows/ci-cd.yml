name: Pipeline CI/CD

# Déclencher à chaque push sur main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1 : Tests ───────────────────────
  test:
    name: Tests automatiques
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: pytest test_app.py -v

  # ── JOB 2 : Build Docker ─────────────────
  build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: test  # Lance seulement si les tests passent
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Vérifier les fichiers
        run: |
          echo "Contenu du répertoire :"
          ls -la
          echo "Contenu du Dockerfile :"
          cat Dockerfile

      - name: Build Docker image
        run: docker build -t mon-app:latest .

      - name: Tester le conteneur
        run: |
          docker run -d -p 5000:5000 --name test-app mon-app:latest
          sleep 5
          curl -f http://localhost:5000/health || (docker logs test-app && exit 1)
          docker stop test-app

  # ── JOB 3 : Deploy ───────────────────────
  deploy:
    name: Deploy sur Docker Hub
    runs-on: ubuntu-latest
    needs: build  # Lance seulement après build réussi
    if: github.ref == 'refs/heads/main'  # Seulement sur main

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push l'image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-app:${{ github.sha }}
