name: Pipeline CI/CD

# Déclencher à chaque push sur main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1 : Tests ───────────────────────
  test:
    name: Tests automatiques
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: pytest test_app.py -v

  # ── JOB 2 : Build Docker ─────────────────
  build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: test  # Lance seulement si les tests passent
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mon-app:latest .

      - name: Tester le conteneur
        run: |
          docker run -d -p 5000:5000 --name test-app mon-app:latest
          sleep 3
          curl http://localhost:5000/health
          docker stop test-app
